spring.application.name=demand

# ? Safe dynamic mapping for Railway
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA Engine Target Configuration Options
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Security Configurations Keys mapped to all-caps environment variables
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-milliseconds=604800000

# Expose dynamic environment port with 8080 fallback
server.port=${PORT:8080}
# Fallback to localhost:5174 if the ALLOWED_ORIGIN environment variable isn't set
app.cors.allowed-origin=${ALLOWED_ORIGIN:http://localhost:5174}